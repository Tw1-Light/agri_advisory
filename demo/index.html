<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AgriAdvisor Demo Controller</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f2eb;
      --ink: #1f2518;
      --panel: #fcfbf7;
      --accent: #2f6f3e;
      --accent-2: #c2672f;
      --muted: #5f6a53;
      --danger: #9f2a2a;
      --ok: #256b4a;
      --shadow: 0 10px 30px rgba(35, 46, 26, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 90% 10%, rgba(194, 103, 47, 0.15), transparent 35%),
        radial-gradient(circle at 10% 80%, rgba(47, 111, 62, 0.18), transparent 30%),
        var(--bg);
      min-height: 100vh;
    }
    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 16px;
    }
    .hero {
      background: linear-gradient(120deg, #203527, #385540 60%, #4b6f57);
      color: #fff;
      padding: 24px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      transform: translateY(8px);
      animation: rise 0.5s ease forwards;
    }
    .hero h1 { margin: 0 0 6px; font-size: 1.7rem; }
    .hero p { margin: 0; color: rgba(255,255,255,0.85); }
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(12, 1fr);
    }
    .card {
      grid-column: span 12;
      background: var(--panel);
      border: 1px solid rgba(46, 58, 33, 0.12);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
      animation: fadeIn 0.45s ease;
    }
    .card h2 { margin: 0 0 12px; font-size: 1.1rem; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    label { font-size: 0.85rem; color: var(--muted); }
    input, select, button, textarea {
      font-family: inherit;
      font-size: 0.95rem;
      border-radius: 10px;
      border: 1px solid rgba(31, 37, 24, 0.2);
      padding: 10px 12px;
    }
    input, select { background: #fff; min-width: 120px; }
    button {
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }
    button:hover { transform: translateY(-1px); }
    button.secondary { background: var(--accent-2); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .chip {
      display: inline-block;
      background: #ebf3e7;
      color: #1d4f2a;
      border: 1px solid #b7d0b4;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .log {
      font-family: "IBM Plex Mono", monospace;
      background: #151d11;
      color: #d8efca;
      border-radius: 12px;
      padding: 10px;
      min-height: 120px;
      white-space: pre-wrap;
      font-size: 0.82rem;
    }
    .error {
      color: var(--danger);
      font-weight: 600;
      margin-top: 6px;
      min-height: 20px;
    }
    .loading {
      display: none;
      font-size: 0.9rem;
      color: var(--accent-2);
      font-weight: 600;
    }
    .loading.show { display: block; }
    @media (min-width: 900px) {
      .left { grid-column: span 5; }
      .right { grid-column: span 7; }
    }
    @keyframes rise {
      to { transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <h1>AgriAdvisor Demo Controller</h1>
      <p>Run SC-02, SC-03, and SC-04 in sequence. API base assumes same host as server.</p>
    </div>

    <div class="grid">
      <section class="card left">
        <h2>Controls</h2>
        <div class="row">
          <label>Farm ID
            <input id="farmId" value="farm_001" />
          </label>
          <label>Scenario
            <select id="scenarioId">
              <option value="SC-02">SC-02</option>
              <option value="SC-03">SC-03</option>
              <option value="SC-04">SC-04</option>
            </select>
          </label>
        </div>
        <div class="row" style="margin-top:10px">
          <button id="loadScenario">Load Scenario</button>
          <button id="updateAm" class="secondary">Update AM Sensors</button>
          <button id="updatePm">Update PM Sensors</button>
        </div>
        <div class="row" style="margin-top:10px">
          <button id="runAm">Run Morning Advisory</button>
          <button id="runPm" class="secondary">Run Evening Diagnostic</button>
        </div>

        <h2 style="margin-top:16px">Sensors</h2>
        <div class="row">
          <label>Moisture <input id="moisture" type="number" step="0.1" /></label>
          <label>pH <input id="ph" type="number" step="0.1" /></label>
          <label>N <input id="N" type="number" step="0.1" /></label>
          <label>P <input id="P" type="number" step="0.1" /></label>
          <label>K <input id="K" type="number" step="0.1" /></label>
        </div>
        <div id="loading" class="loading">Calling API...</div>
        <div id="error" class="error"></div>
      </section>

      <section class="card right">
        <h2>Advisory / Diagnostic Output</h2>
        <div id="chips"></div>
        <div id="output" class="log">No run yet.</div>
      </section>
    </div>
  </div>

  <script>
    const scenarioData = {
      "SC-02": {
        am: { moisture: 34, ph: 6.2, N: 95, P: 180, K: 120 },
        pm: { moisture: 36, ph: 6.2, N: 112, P: 179, K: 121 }
      },
      "SC-03": {
        am: { moisture: 72, ph: 6.5, N: 55, P: 48, K: 35 },
        pm: { moisture: 75, ph: 6.5, N: 55, P: 48, K: 35 }
      },
      "SC-04": {
        am: { moisture: 55, ph: 6.0, N: 20, P: 40, K: 60 },
        pm: { moisture: 48, ph: 6.0, N: 20, P: 40, K: 61 }
      }
    };

    const el = (id) => document.getElementById(id);
    const setLoading = (v) => el("loading").classList.toggle("show", v);
    const setError = (msg) => { el("error").textContent = msg || ""; };

    function sensorPayload() {
      return {
        moisture: Number(el("moisture").value),
        ph: Number(el("ph").value),
        N: Number(el("N").value),
        P: Number(el("P").value),
        K: Number(el("K").value),
      };
    }

    function setSensors(v) {
      el("moisture").value = v.moisture;
      el("ph").value = v.ph;
      el("N").value = v.N;
      el("P").value = v.P;
      el("K").value = v.K;
    }

    async function api(path, options = {}) {
      setError("");
      setLoading(true);
      try {
        const res = await fetch(path, {
          headers: { "Content-Type": "application/json" },
          ...options
        });
        const text = await res.text();
        const data = text ? JSON.parse(text) : {};
        if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
        return data;
      } finally {
        setLoading(false);
      }
    }

    function renderChips(data) {
      const chips = [];
      if (data.run_type) chips.push(`<span class="chip">run: ${data.run_type}</span>`);
      if (data.crop_stage?.phase_name) chips.push(`<span class="chip">phase: ${data.crop_stage.phase_name}</span>`);
      if (data.confidence_label) chips.push(`<span class="chip">confidence: ${data.confidence_label}</span>`);
      if (data.ai_diagnostic?.outcome_verified === true) chips.push('<span class="chip">outcome: verified</span>');
      if (data.ai_diagnostic?.outcome_verified === false) chips.push('<span class="chip">outcome: deviation</span>');
      if (data.price?.trend) chips.push(`<span class="chip">mandi trend: ${data.price.trend}</span>`);
      el("chips").innerHTML = chips.join("");
    }

    function renderOutput(data) {
      renderChips(data);
      el("output").textContent = JSON.stringify(data, null, 2);
    }

    async function updateSensors(mode) {
      const farmId = el("farmId").value.trim();
      const scenario = el("scenarioId").value;
      setSensors(scenarioData[scenario][mode]);
      const payload = {
        farm_id: farmId,
        sensors: sensorPayload(),
        sensor_timestamp: new Date().toISOString()
      };
      const res = await api("/sensor-update", { method: "POST", body: JSON.stringify(payload) });
      renderOutput(res);
    }

    el("loadScenario").addEventListener("click", async () => {
      try {
        const data = await api("/demo/load-scenario", {
          method: "POST",
          body: JSON.stringify({ scenario_id: el("scenarioId").value, farm_id: el("farmId").value.trim() })
        });
        setSensors(scenarioData[el("scenarioId").value].am);
        renderOutput(data);
      } catch (e) { setError(e.message); }
    });

    el("updateAm").addEventListener("click", async () => {
      try { await updateSensors("am"); } catch (e) { setError(e.message); }
    });

    el("updatePm").addEventListener("click", async () => {
      try { await updateSensors("pm"); } catch (e) { setError(e.message); }
    });

    el("runAm").addEventListener("click", async () => {
      try {
        const data = await api("/trigger/am", {
          method: "POST",
          body: JSON.stringify({ farm_id: el("farmId").value.trim() })
        });
        renderOutput(data);
      } catch (e) { setError(e.message); }
    });

    el("runPm").addEventListener("click", async () => {
      try {
        const data = await api("/trigger/pm", {
          method: "POST",
          body: JSON.stringify({ farm_id: el("farmId").value.trim() })
        });
        renderOutput(data);
      } catch (e) { setError(e.message); }
    });

    setSensors(scenarioData["SC-02"].am);
  </script>
</body>
</html>
